services:
  - type: web
    name: customer-bot-15
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: CUSTOMER_BOT_TOKEN
        sync: false
      - key: CUSTOMER_ADMIN_ID
        sync: false
      - key: BASE_URL
        sync: false
      - key: PAYMENT_LINK
        sync: false
      - key: CARD_NUMBER
        sync: false
      - key: CARD_HOLDER
        sync: false
